appId: com.okami.workbench
productName: OkamiCode
asar: true
afterPack: scripts/generate-managed-runtime-trust-manifest.mjs

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

asarUnpack:
  - "**/*.node"
  - "node_modules/@openai/**/*"
  - "node_modules/@xai-official/**/*"
  - "node_modules/**/opencode-*/**/*"

extraResources:
  - from: .cache/managed-runtimes/darwin-arm64
    to: managed-runtimes/darwin-arm64
    filter:
      - "**/*"

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  artifactName: "${productName}-v${version}-macOS-${arch}.${ext}"
  target:
    - target: dmg
      arch:
        - arm64
    - target: dir
      arch:
        - arm64
