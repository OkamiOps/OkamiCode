appId: com.okami.workbench
productName: OkamiCode
asar: true

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

asarUnpack:
  - "**/*.node"
  - "node_modules/@openai/**/*"
  - "node_modules/@xai-official/**/*"

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  artifactName: "${productName}-v${version}-macOS-${arch}.${ext}"
  target:
    - target: dmg
      arch:
        - arm64
    - target: dir
      arch:
        - arm64
